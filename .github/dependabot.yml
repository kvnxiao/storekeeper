version: 2

updates:
  # React frontend (pnpm) - frontend/package.json
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(frontend)"
    groups:
      # Single PR per ecosystem: catch all update types (incl. major) so
      # updates are batched into one PR rather than opened individually.
      frontend:
        patterns: ["*"]

  # Tauri / Rust workspace - root Cargo.toml and all member crates
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(rust)"
    groups:
      rust:
        patterns: ["*"]

  # GitHub Actions versions used in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
