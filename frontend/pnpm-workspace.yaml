# Minimum release age (in minutes) before a published version is installable.
# 10080 = 7 days. Mirrors the Dependabot `cooldown` so the pnpm/Vite+ side
# (incl. the catalog packages below) also waits out fresh releases.
minimumReleaseAge: 10080
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.2.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
